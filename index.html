<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4f0;
    --card: #ffffff;
    --border: #e8e2db;
    --text: #1a1614;
    --muted: #8a7f78;
    --accent: #c9513a;
    --radius: 14px;
    --header-bg: #1a1614;
    --modal-bg: #ffffff;
    --input-bg: #f7f4f0;
    --chip-bg: #f0ede8;
  }

.dark {
–bg: #1a1614;
–card: #2a2320;
–border: #3d3530;
–text: #f0ebe6;
–muted: #8a7f78;
–header-bg: #111110;
–modal-bg: #2a2320;
–input-bg: #1a1614;
–chip-bg: #3d3530;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Helvetica Neue’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
padding-bottom: 80px;
transition: background 0.3s, color 0.3s;
}

.header {
background: var(–header-bg);
color: white;
padding: 52px 20px 0;
position: sticky;
top: 0;
z-index: 100;
}

.header-top {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 12px;
}

.header-actions { display: flex; align-items: center; gap: 8px; }

.app-title {
font-family: ‘DM Serif Display’, Georgia, serif;
font-size: 26px;
letter-spacing: -0.5px;
color: white;
}

.app-title span { color: #c9513a; }

.icon-btn {
background: rgba(255,255,255,0.1);
border: none;
color: white;
width: 34px;
height: 34px;
border-radius: 8px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
flex-shrink: 0;
}

.icon-btn:hover { background: rgba(255,255,255,0.2); }

.search-wrap { padding: 0 0 10px; position: relative; }

.search-input {
width: 100%;
background: rgba(255,255,255,0.1);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 10px;
padding: 9px 14px 9px 36px;
font-size: 14px;
font-family: inherit;
color: white;
outline: none;
}

.search-input::placeholder { color: rgba(255,255,255,0.4); }
.search-input:focus { background: rgba(255,255,255,0.15); }

.search-icon {
position: absolute;
left: 12px;
top: 50%;
transform: translateY(-50%);
font-size: 14px;
opacity: 0.5;
pointer-events: none;
}

.filter-bar {
display: flex;
gap: 6px;
padding: 0 0 10px;
overflow-x: auto;
scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
white-space: nowrap;
font-size: 12px;
font-weight: 500;
padding: 5px 12px;
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.2);
background: transparent;
color: rgba(255,255,255,0.6);
cursor: pointer;
font-family: inherit;
transition: all 0.15s;
}

.filter-chip.active { background: #c9513a; border-color: #c9513a; color: white; }

.tabs { display: flex; }

.tab {
flex: 1;
padding: 12px;
text-align: center;
font-size: 14px;
font-weight: 500;
color: rgba(255,255,255,0.5);
cursor: pointer;
border-bottom: 3px solid transparent;
transition: all 0.2s;
}

.tab.active { color: white; border-bottom-color: #c9513a; }

.content { padding: 20px; max-width: 680px; margin: 0 auto; }

.section-label {
font-size: 11px;
font-weight: 600;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–muted);
margin: 24px 0 10px;
display: flex;
align-items: center;
gap: 8px;
}

.section-label::after { content: ‘’; flex: 1; height: 1px; background: var(–border); }

.add-btn {
width: 100%;
border: 2px dashed var(–border);
background: transparent;
border-radius: var(–radius);
padding: 14px;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
font-size: 14px;
font-weight: 500;
color: var(–muted);
cursor: pointer;
transition: all 0.2s;
font-family: inherit;
}

.add-btn:hover { border-color: #c9513a; color: #c9513a; }
.add-btn .plus { font-size: 20px; font-weight: 300; }

.task-card {
background: var(–card);
border: 1.5px solid var(–border);
border-radius: var(–radius);
margin-bottom: 10px;
overflow: hidden;
transition: background 0.3s;
}

.task-main {
padding: 14px 16px;
display: flex;
align-items: flex-start;
gap: 12px;
}

.checkbox {
width: 28px;
height: 28px;
min-width: 28px;
min-height: 28px;
border: 3px solid var(–text);
border-radius: 8px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
margin-top: 2px;
background: var(–card);
box-sizing: border-box;
box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

.checkbox.checked { background: #c9513a !important; border-color: #c9513a !important; }
.checkbox.checked::after {
content: ‘’;
display: block;
width: 14px;
height: 8px;
border-left: 3px solid white;
border-bottom: 3px solid white;
transform: rotate(-45deg) translateY(-2px);
}

.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 15px; font-weight: 500; line-height: 1.3; word-break: break-word; }
.task-name.done { text-decoration: line-through; color: var(–muted); }
.task-desc { font-size: 13px; color: var(–muted); margin-top: 3px; line-height: 1.4; }
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

.meta-chip { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.chip-created { background: var(–chip-bg); color: var(–muted); }
.chip-due { background: #fff0e8; color: #c96030; }
.chip-due.overdue { background: #ffe8e8; color: #c93030; }
.chip-completed { background: #e8f4e8; color: #2a7a2a; }
.chip-recurring { background: #e8f0ff; color: #3a6bc9; }

.task-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }

.action-btn {
width: 28px; height: 28px;
border: none; background: transparent;
cursor: pointer; border-radius: 6px;
display: flex; align-items: center; justify-content: center;
font-size: 14px;
}

.action-btn:hover { background: var(–border); }

.expand-btn {
background: none; border: none; color: var(–muted);
cursor: pointer; font-size: 16px; border-radius: 4px;
transition: transform 0.2s; width: 28px; height: 28px;
display: flex; align-items: center; justify-content: center;
}

.expand-btn.open { transform: rotate(180deg); }

/* SUBTASKS */
.subtasks { padding: 0 16px 14px 50px; }

.subtask-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-top: 1px solid var(–border); }

.subtask-checkbox {
width: 18px; height: 18px; min-width: 18px;
border: 2px solid var(–text); border-radius: 4px;
cursor: pointer; display: flex; align-items: center; justify-content: center;
flex-shrink: 0; background: var(–card);
}

.subtask-checkbox.checked { background: var(–muted); border-color: var(–muted); }
.subtask-checkbox.checked::after {
content: ‘’;
display: block;
width: 9px; height: 5px;
border-left: 2px solid white;
border-bottom: 2px solid white;
transform: rotate(-45deg) translateY(-1px);
}

.subtask-name { font-size: 13px; flex: 1; color: var(–text); }
.subtask-name.done { text-decoration: line-through; color: var(–muted); }
.subtask-del { background: none; border: none; color: var(–muted); cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; }

.add-subtask-row { display: flex; gap: 6px; padding-top: 6px; border-top: 1px solid var(–border); }

.subtask-input {
flex: 1; border: 1px solid var(–border); border-radius: 8px;
padding: 6px 10px; font-size: 13px; font-family: inherit;
background: var(–input-bg); color: var(–text); outline: none;
}

.subtask-input:focus { border-color: var(–text); }

.subtask-add-btn {
background: var(–text); color: var(–bg);
border: none; border-radius: 8px; padding: 6px 12px;
font-size: 12px; cursor: pointer; font-family: inherit;
}

/* NOTES */
.notes-section { padding: 0 16px 14px 16px; border-top: 1px solid var(–border); }

.notes-title {
font-size: 11px; font-weight: 600; letter-spacing: 1px;
text-transform: uppercase; color: var(–muted); padding: 10px 0 8px;
}

.comment-item {
background: var(–input-bg); border-radius: 8px;
padding: 8px 10px; margin-bottom: 6px; position: relative;
}

.comment-text { font-size: 13px; color: var(–text); line-height: 1.4; padding-right: 24px; }
.comment-date { font-size: 11px; color: var(–muted); margin-top: 3px; }

.comment-del {
position: absolute; top: 8px; right: 8px;
background: none; border: none; color: var(–muted);
cursor: pointer; font-size: 12px; padding: 0 2px; border-radius: 4px;
}

.add-comment-row { display: flex; gap: 6px; margin-top: 6px; }

.comment-input {
flex: 1; border: 1px solid var(–border); border-radius: 8px;
padding: 7px 10px; font-size: 13px; font-family: inherit;
background: var(–input-bg); color: var(–text); outline: none;
}

.comment-input:focus { border-color: var(–text); }

.comment-add-btn {
background: var(–text); color: var(–bg);
border: none; border-radius: 8px; padding: 7px 12px;
font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap;
}

/* COMPLETED */
.date-divider { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(–muted); margin-bottom: 8px; padding-left: 4px; }
.completed-group { margin-bottom: 20px; }

/* MODALS */
.modal-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,0.6);
z-index: 200; display: flex; align-items: flex-end; justify-content: center;
}

.modal {
background: var(–modal-bg); border-radius: 20px 20px 0 0;
padding: 24px 20px 50px; width: 100%; max-width: 680px;
max-height: 90vh; overflow-y: auto;
animation: slideUp 0.25s ease-out; color: var(–text);
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-title { font-family: ‘DM Serif Display’, Georgia, serif; font-size: 22px; margin-bottom: 20px; color: var(–text); }

.form-group { margin-bottom: 16px; }

.form-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(–muted); margin-bottom: 6px; }

.form-input, .form-textarea, .form-select {
width: 100%; border: 1.5px solid var(–border); border-radius: 10px;
padding: 11px 14px; font-size: 15px; font-family: inherit;
background: var(–input-bg); color: var(–text); outline: none;
}

.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(–text); }
.form-textarea { resize: vertical; min-height: 80px; }

.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

.color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

.color-chip {
width: 34px; height: 34px; border-radius: 50%;
cursor: pointer; border: 3px solid transparent;
display: flex; align-items: center; justify-content: center; font-size: 12px;
}

.color-chip.selected { border-color: var(–text); }

.modal-footer { display: flex; gap: 10px; margin-top: 20px; }

.btn-cancel {
flex: 1; padding: 13px; border: 1.5px solid var(–border); border-radius: 10px;
background: transparent; font-size: 15px; font-weight: 500;
cursor: pointer; font-family: inherit; color: var(–muted);
}

.btn-save {
flex: 2; padding: 13px; border: none; border-radius: 10px;
background: var(–text); color: var(–bg);
font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
}

/* EXPORT */
.export-menu {
background: var(–modal-bg); border-radius: 20px 20px 0 0;
padding: 24px 20px 50px; width: 100%; max-width: 680px;
animation: slideUp 0.25s ease-out;
}

.export-title { font-family: ‘DM Serif Display’, Georgia, serif; font-size: 20px; margin-bottom: 6px; color: var(–text); }
.export-sub { font-size: 13px; color: var(–muted); margin-bottom: 20px; }

.export-btn {
width: 100%; padding: 14px 16px; border: 1.5px solid var(–border);
border-radius: 12px; background: var(–card); color: var(–text);
font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
text-align: left; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
}

.export-btn:hover { border-color: #c9513a; }
.export-btn-icon { font-size: 22px; }
.export-btn-text { display: flex; flex-direction: column; }
.export-btn-label { font-weight: 600; }
.export-btn-desc { font-size: 12px; color: var(–muted); margin-top: 2px; }

.empty { text-align: center; padding: 40px 20px; color: var(–muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.stats-bar { display: flex; gap: 12px; margin-bottom: 8px; }
.stat { font-size: 12px; color: var(–muted); }
.stat strong { color: var(–text); font-weight: 600; }
.no-results { text-align: center; padding: 30px; color: var(–muted); font-size: 14px; }

@media (max-width: 400px) { .form-row { flex-direction: column; } }
@media (min-width: 600px) { .header { padding-top: 20px; } }
</style>

</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Task<span>Flow</span></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
      <button class="icon-btn" onclick="openExport()">⬇️</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search tasks..." oninput="render()" />
  </div>
  <div class="filter-bar">
    <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-chip" data-filter="urgent" onclick="setFilter('urgent',this)">🌸 Urgent</button>
    <button class="filter-chip" data-filter="flagged" onclick="setFilter('flagged',this)">🚩 Flagged</button>
    <button class="filter-chip" data-filter="due" onclick="setFilter('due',this)">📅 Due Soon</button>
    <button class="filter-chip" data-filter="overdue" onclick="setFilter('overdue',this)">⚠️ Overdue</button>
    <button class="filter-chip" data-filter="recurring" onclick="setFilter('recurring',this)">🔁 Recurring</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('work')">💼 Work</div>
    <div class="tab" onclick="switchTab('personal')">🏠 Personal</div>
  </div>
</div>

<div class="content">
  <div class="stats-bar">
    <div class="stat"><strong id="openCount">0</strong> open</div>
    <div class="stat"><strong id="doneCount">0</strong> done</div>
    <div class="stat"><strong id="urgentCount">0</strong> urgent</div>
  </div>
  <div class="section-label">Active Tasks</div>
  <button class="add-btn" onclick="openModal()"><span class="plus">+</span> Add New Task</button>
  <div id="taskList"></div>
  <div class="section-label">Completed</div>
  <div id="completedList"></div>
</div>

<!-- TASK MODAL -->

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Task</div>
    <div class="form-group">
      <label class="form-label">Task Name *</label>
      <input type="text" class="form-input" id="taskNameInput" placeholder="What needs to be done?" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="taskDescInput" placeholder="Any details or notes..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input type="date" class="form-input" id="taskDueInput" />
      </div>
      <div class="form-group">
        <label class="form-label">Flag</label>
        <select class="form-input form-select" id="taskFlagInput">
          <option value="">No flag</option>
          <option value="waiting">⏳ Waiting</option>
          <option value="review">👁 Review</option>
          <option value="question">❓ Question</option>
          <option value="followup">🔁 Follow up</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Recurring</label>
      <select class="form-input form-select" id="taskRecurInput">
        <option value="">Not recurring</option>
        <option value="daily">📅 Daily</option>
        <option value="weekly">📅 Weekly</option>
        <option value="monthly">📅 Monthly</option>
        <option value="quarterly">📅 Quarterly</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Highlight Color</label>
      <div class="color-row">
        <div class="color-chip" style="background:#ffe0ec;" data-color="pink" onclick="selectColor(this,'pink')">🌸</div>
        <div class="color-chip" style="background:#fef9c3;" data-color="yellow" onclick="selectColor(this,'yellow')">⭐</div>
        <div class="color-chip" style="background:#dbeafe;" data-color="blue" onclick="selectColor(this,'blue')">💙</div>
        <div class="color-chip" style="background:#dcfce7;" data-color="green" onclick="selectColor(this,'green')">💚</div>
        <div class="color-chip" style="background:#ede9fe;" data-color="purple" onclick="selectColor(this,'purple')">💜</div>
        <div class="color-chip" style="background:#f1f5f9;" data-color="" onclick="selectColor(this,'')">✕</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->

<div class="modal-overlay" id="exportOverlay" style="display:none" onclick="handleExportOverlayClick(event)">
  <div class="export-menu">
    <div class="export-title">Export & Backup</div>
    <div class="export-sub">Download your tasks to keep them safe or open in another app.</div>
    <button class="export-btn" onclick="exportCSV()">
      <span class="export-btn-icon">📊</span>
      <span class="export-btn-text">
        <span class="export-btn-label">Export as CSV</span>
        <span class="export-btn-desc">Opens in Excel, Google Sheets, Numbers</span>
      </span>
    </button>
    <button class="export-btn" onclick="exportJSON()">
      <span class="export-btn-icon">💾</span>
      <span class="export-btn-text">
        <span class="export-btn-label">Export as JSON (Full Backup)</span>
        <span class="export-btn-desc">Complete backup — restore all your tasks later</span>
      </span>
    </button>
    <button class="export-btn" onclick="importJSON()">
      <span class="export-btn-icon">📥</span>
      <span class="export-btn-text">
        <span class="export-btn-label">Restore from Backup</span>
        <span class="export-btn-desc">Import a previously saved JSON backup file</span>
      </span>
    </button>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImport(event)" />
    <button class="btn-cancel" style="width:100%;margin-top:4px;" onclick="closeExport()">Cancel</button>
  </div>
</div>

<script>
const COLORS = {
  pink:   { bg: '#ffe0ec', border: '#f4a0c0' },
  yellow: { bg: '#fef9c3', border: '#f0d060' },
  blue:   { bg: '#dbeafe', border: '#93c5fd' },
  green:  { bg: '#dcfce7', border: '#86efac' },
  purple: { bg: '#ede9fe', border: '#c4b5fd' },
  '':     { bg: '', border: '' },
};
const FLAG_LABELS = { waiting:'⏳ Waiting', review:'👁 Review', question:'❓ Question', followup:'🔁 Follow-up' };
const RECUR_LABELS = { daily:'Daily', weekly:'Weekly', monthly:'Monthly', quarterly:'Quarterly' };

let activeTab = 'work';
let activeFilter = 'all';
let tasks = (() => { try { return JSON.parse(localStorage.getItem('tf_tasks')) || []; } catch { return []; } })();
let darkMode = localStorage.getItem('tf_dark') === 'true';
let editingId = null;
let selectedColor = '';

function save() { localStorage.setItem('tf_tasks', JSON.stringify(tasks)); }

if (darkMode) { document.body.classList.add('dark'); document.getElementById('darkBtn').textContent = '☀️'; }
render();

function toggleDark() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('darkBtn').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('tf_dark', darkMode);
}

function switchTab(tab) {
  activeTab = tab; activeFilter = 'all';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='work')||(i===1&&tab==='personal')));
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter==='all'));
  render();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function openModal(id) {
  editingId = id || null; selectedColor = '';
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
  ['taskNameInput','taskDescInput','taskDueInput'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('taskFlagInput').value = '';
  document.getElementById('taskRecurInput').value = '';
  if (id) {
    const t = tasks.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = 'Edit Task';
    document.getElementById('taskNameInput').value = t.name;
    document.getElementById('taskDescInput').value = t.desc || '';
    document.getElementById('taskDueInput').value = t.due || '';
    document.getElementById('taskFlagInput').value = t.flag || '';
    document.getElementById('taskRecurInput').value = t.recur || '';
    selectedColor = t.color || '';
    document.querySelectorAll('.color-chip').forEach(c => { if (c.dataset.color === selectedColor) c.classList.add('selected'); });
  } else { document.getElementById('modalTitle').textContent = 'New Task'; }
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('taskNameInput').focus(), 150);
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; editingId = null; }
function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function selectColor(el, color) {
  selectedColor = color;
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function saveTask() {
  const name = document.getElementById('taskNameInput').value.trim();
  if (!name) { document.getElementById('taskNameInput').style.borderColor = 'red'; return; }
  document.getElementById('taskNameInput').style.borderColor = '';
  const due = document.getElementById('taskDueInput').value;
  const desc = document.getElementById('taskDescInput').value.trim();
  const flag = document.getElementById('taskFlagInput').value;
  const recur = document.getElementById('taskRecurInput').value;
  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    Object.assign(t, { name, desc, due, flag, recur, color: selectedColor });
  } else {
    tasks.push({ id: Date.now().toString(), tab: activeTab, name, desc, due, flag, recur, color: selectedColor, created: new Date().toISOString(), done: false, completedAt: null, subtasks: [], expanded: false, notesExpanded: false, comments: [] });
  }
  save(); closeModal(); render();
}

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  t.done = !t.done; t.completedAt = t.done ? new Date().toISOString() : null;
  if (t.done && t.recur) { const next = makeRecurring(t); if (next) tasks.push(next); }
  save(); render();
}

function makeRecurring(t) {
  const base = t.due ? new Date(t.due + 'T12:00:00') : new Date();
  const next = new Date(base);
  if (t.recur === 'daily') next.setDate(next.getDate()+1);
  else if (t.recur === 'weekly') next.setDate(next.getDate()+7);
  else if (t.recur === 'monthly') next.setMonth(next.getMonth()+1);
  else if (t.recur === 'quarterly') next.setMonth(next.getMonth()+3);
  const p = n => String(n).padStart(2,'0');
  return { id: Date.now()+Math.random()+'', tab:t.tab, name:t.name, desc:t.desc, due:`${next.getFullYear()}-${p(next.getMonth()+1)}-${p(next.getDate())}`, flag:t.flag, recur:t.recur, color:t.color, created:new Date().toISOString(), done:false, completedAt:null, subtasks:[], expanded:false, notesExpanded:false, comments:[] };
}

function toggleHighlight(id) { const t=tasks.find(x=>x.id===id); t.color=t.color?'':'pink'; save(); render(); }
function toggleFlag(id) { const t=tasks.find(x=>x.id===id); t.flagged=!t.flagged; save(); render(); }
function toggleExpand(id) { const t=tasks.find(x=>x.id===id); t.expanded=!t.expanded; if(t.expanded)t.notesExpanded=false; save(); render(); }
function toggleNotes(id) { const t=tasks.find(x=>x.id===id); t.notesExpanded=!t.notesExpanded; if(t.notesExpanded)t.expanded=false; save(); render(); }
function deleteTask(id) { if(!confirm('Delete this task?'))return; tasks=tasks.filter(x=>x.id!==id); save(); render(); }

function addSubtask(taskId) {
  const input = document.getElementById('sub-input-'+taskId);
  const name = input.value.trim(); if(!name)return;
  tasks.find(x=>x.id===taskId).subtasks.push({id:Date.now()+'',name,done:false});
  save(); render();
}
function toggleSubtask(tid,sid) { const t=tasks.find(x=>x.id===tid),s=t.subtasks.find(x=>x.id===sid); s.done=!s.done; save(); render(); }
function deleteSubtask(tid,sid) { const t=tasks.find(x=>x.id===tid); t.subtasks=t.subtasks.filter(x=>x.id!==sid); save(); render(); }

function addComment(taskId) {
  const input = document.getElementById('comment-input-'+taskId);
  const text = input.value.trim(); if(!text)return;
  const t = tasks.find(x=>x.id===taskId);
  if(!t.comments)t.comments=[];
  t.comments.push({id:Date.now()+'',text,date:new Date().toISOString()});
  save(); render();
}
function deleteComment(tid,cid) { const t=tasks.find(x=>x.id===tid); t.comments=t.comments.filter(x=>x.id!==cid); save(); render(); }

function openExport() { document.getElementById('exportOverlay').style.display='flex'; }
function closeExport() { document.getElementById('exportOverlay').style.display='none'; }
function handleExportOverlayClick(e) { if(e.target===document.getElementById('exportOverlay'))closeExport(); }

function exportCSV() {
  const h = ['Tab','Name','Description','Created','Due Date','Completed At','Status','Flag','Recurring','Highlight','Flagged','Subtasks','Notes'];
  const rows = tasks.map(t => [t.tab,t.name,(t.desc||'').replace(/,/g,';'),fmtDate(t.created),t.due||'',t.completedAt?fmtDateTime(t.completedAt):'',t.done?'Completed':'Open',t.flag||'',t.recur||'',t.color||'',t.flagged?'Yes':'No',(t.subtasks||[]).map(s=>s.name).join(' | '),(t.comments||[]).map(c=>c.text).join(' | ')]);
  const csv = [h,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  download('taskflow-backup.csv','text/csv',csv); closeExport();
}

function exportJSON() { download('taskflow-backup.json','application/json',JSON.stringify(tasks,null,2)); closeExport(); }
function importJSON() { document.getElementById('importFileInput').click(); }

function handleImport(e) {
  const file = e.target.files[0]; if(!file)return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if(!Array.isArray(imported))throw new Error();
      if(confirm(`Import ${imported.length} tasks? This will replace your current tasks.`)) { tasks=imported; save(); render(); closeExport(); alert('Tasks restored!'); }
    } catch { alert('Invalid backup file.'); }
  };
  reader.readAsText(file); e.target.value='';
}

function download(filename,type,content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDateTime(iso) { const d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function isOverdue(due) { return due && new Date(due+'T23:59:59')<new Date(); }
function isDueSoon(due) { if(!due)return false; const d=new Date(due+'T23:59:59'),now=new Date(),soon=new Date(); soon.setDate(soon.getDate()+3); return d>=now&&d<=soon; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderCard(t) {
  const col = COLORS[t.color]||COLORS[''];
  let cs = '';
  if(col.bg) cs+=`background:${col.bg};border-color:${col.border};`;
  if(t.flagged) cs+='border-left:4px solid #f0a500;';

  const dueChip = t.due ? `<span class="meta-chip chip-due${isOverdue(t.due)&&!t.done?' overdue':''}">${isOverdue(t.due)&&!t.done?'⚠ ':''}Due ${fmtDate(t.due+'T12:00:00')}</span>` : '';
  const flagChip = t.flag ? `<span class="meta-chip chip-created">${FLAG_LABELS[t.flag]||t.flag}</span>` : '';
  const completedChip = t.done&&t.completedAt ? `<span class="meta-chip chip-completed">✓ ${fmtDateTime(t.completedAt)}</span>` : '';
  const recurChip = t.recur ? `<span class="meta-chip chip-recurring">🔁 ${RECUR_LABELS[t.recur]}</span>` : '';
  const subCount=t.subtasks?.length||0, subDone=t.subtasks?.filter(s=>s.done).length||0;
  const subtaskChip = subCount>0 ? `<span class="meta-chip chip-created">📋 ${subDone}/${subCount}</span>` : '';
  const commentCount=t.comments?.length||0;
  const commentChip = commentCount>0 ? `<span class="meta-chip chip-created">💬 ${commentCount}</span>` : '';

  const subtasksHtml = t.expanded ? `<div class="subtasks">${(t.subtasks||[]).map(s=>`<div class="subtask-item"><div class="subtask-checkbox ${s.done?'checked':''}" onclick="toggleSubtask('${t.id}','${s.id}')"></div><span class="subtask-name ${s.done?'done':''}">${esc(s.name)}</span><button class="subtask-del" onclick="deleteSubtask('${t.id}','${s.id}')">✕</button></div>`).join('')}<div class="add-subtask-row"><input class="subtask-input" id="sub-input-${t.id}" placeholder="Add subtask..." onkeydown="if(event.key==='Enter')addSubtask('${t.id}')" /><button class="subtask-add-btn" onclick="addSubtask('${t.id}')">Add</button></div></div>` : '';

  const notesHtml = t.notesExpanded ? `<div class="notes-section"><div class="notes-title">💬 Notes & Updates</div>${(t.comments||[]).map(c=>`<div class="comment-item"><button class="comment-del" onclick="deleteComment('${t.id}','${c.id}')">✕</button><div class="comment-text">${esc(c.text)}</div><div class="comment-date">${fmtDateTime(c.date)}</div></div>`).join('')}<div class="add-comment-row"><input class="comment-input" id="comment-input-${t.id}" placeholder="Add a note or update..." onkeydown="if(event.key==='Enter')addComment('${t.id}')" /><button class="comment-add-btn" onclick="addComment('${t.id}')">Add</button></div></div>` : '';

  return `<div class="task-card" style="${cs}"><div class="task-main"><div class="checkbox ${t.done?'checked':''}" onclick="toggleDone('${t.id}')"></div><div class="task-body"><div class="task-name ${t.done?'done':''}">${esc(t.name)}</div>${t.desc?`<div class="task-desc">${esc(t.desc)}</div>`:''}<div class="task-meta"><span class="meta-chip chip-created">Added ${fmtDate(t.created)}</span>${dueChip}${recurChip}${flagChip}${subtaskChip}${commentChip}${completedChip}</div></div><div class="task-actions"><button class="action-btn" onclick="toggleHighlight('${t.id}')">${t.color?'🌸':'○'}</button><button class="action-btn" onclick="toggleFlag('${t.id}')">${t.flagged?'🚩':'⚑'}</button><button class="action-btn" onclick="toggleNotes('${t.id}')">💬</button><button class="expand-btn ${t.expanded?'open':''}" onclick="toggleExpand('${t.id}')">▾</button><button class="action-btn" onclick="openModal('${t.id}')">✏️</button><button class="action-btn" onclick="deleteTask('${t.id}')">🗑</button></div></div>${subtasksHtml}${notesHtml}</div>`;
}

function render() {
  const query = (document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  let tt = tasks.filter(t=>t.tab===activeTab);
  if(query) tt=tt.filter(t=>t.name.toLowerCase().includes(query)||(t.desc||'').toLowerCase().includes(query)||(t.comments||[]).some(c=>c.text.toLowerCase().includes(query)));
  if(activeFilter==='urgent') tt=tt.filter(t=>t.color&&!t.done);
  else if(activeFilter==='flagged') tt=tt.filter(t=>t.flagged&&!t.done);
  else if(activeFilter==='due') tt=tt.filter(t=>isDueSoon(t.due)&&!t.done);
  else if(activeFilter==='overdue') tt=tt.filter(t=>isOverdue(t.due)&&!t.done);
  else if(activeFilter==='recurring') tt=tt.filter(t=>t.recur&&!t.done);

  const open=tt.filter(t=>!t.done).sort((a,b)=>{
    if(!!a.color!==!!b.color)return a.color?-1:1;
    if(a.due&&b.due)return a.due.localeCompare(b.due);
    if(a.due)return -1; if(b.due)return 1;
    return new Date(b.created)-new Date(a.created);
  });
  const done=tt.filter(t=>t.done).sort((a,b)=>new Date(b.completedAt)-new Date(a.completedAt));

  document.getElementById('taskList').innerHTML = open.length ? open.map(renderCard).join('') : query ? `<div class="no-results">No tasks found for "${esc(query)}"</div>` : '<div class="empty"><div class="empty-icon">✅</div><div>No open tasks — all caught up!</div></div>';

  if(!done.length) {
    document.getElementById('completedList').innerHTML = query?'':`<div class="empty"><div>No completed tasks yet</div></div>`;
  } else {
    const groups={};
    done.forEach(t=>{const k=new Date(t.completedAt).toDateString();if(!groups[k])groups[k]=[];groups[k].push(t);});
    document.getElementById('completedList').innerHTML=Object.keys(groups).map(k=>{
      const d=new Date(k),today=new Date(),yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      const label=d.toDateString()===today.toDateString()?'Completed Today':d.toDateString()===yesterday.toDateString()?'Completed Yesterday':'Completed '+d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
      return `<div class="completed-group"><div class="date-divider">${label}</div>${groups[k].map(renderCard).join('')}</div>`;
    }).join('');
  }

  const allOpen=tasks.filter(t=>t.tab===activeTab&&!t.done);
  document.getElementById('openCount').textContent=allOpen.length;
  document.getElementById('doneCount').textContent=tasks.filter(t=>t.tab===activeTab&&t.done).length;
  document.getElementById('urgentCount').textContent=allOpen.filter(t=>t.color).length;
}
</script>
