<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4f0;
    --card: #ffffff;
    --border: #e8e2db;
    --text: #1a1614;
    --muted: #8a7f78;
    --accent: #c9513a;
    --work: #3a6bc9;
    --personal: #7c3ac9;
    --pink-highlight: #ffe0ec;
    --pink-border: #f4a0c0;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px;
    --tab-active: #1a1614;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
padding-bottom: 80px;
}

/* HEADER */
.header {
background: var(–text);
color: white;
padding: 20px 20px 0;
position: sticky;
top: 0;
z-index: 100;
}

.header-top {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}

.app-title {
font-family: ‘DM Serif Display’, serif;
font-size: 26px;
letter-spacing: -0.5px;
}

.app-title span { color: var(–accent); }

.today-badge {
font-size: 12px;
color: rgba(255,255,255,0.5);
background: rgba(255,255,255,0.1);
padding: 4px 10px;
border-radius: 20px;
}

/* TABS */
.tabs {
display: flex;
gap: 0;
}

.tab {
flex: 1;
padding: 12px;
text-align: center;
font-size: 14px;
font-weight: 500;
color: rgba(255,255,255,0.5);
cursor: pointer;
border-bottom: 3px solid transparent;
transition: all 0.2s;
letter-spacing: 0.3px;
}

.tab.active {
color: white;
border-bottom-color: var(–accent);
}

/* MAIN CONTENT */
.content { padding: 20px; max-width: 680px; margin: 0 auto; }

/* SECTION HEADERS */
.section-label {
font-size: 11px;
font-weight: 600;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–muted);
margin: 24px 0 10px;
display: flex;
align-items: center;
gap: 8px;
}

.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

/* ADD BUTTON */
.add-btn {
width: 100%;
border: 2px dashed var(–border);
background: transparent;
border-radius: var(–radius);
padding: 14px;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
font-size: 14px;
font-weight: 500;
color: var(–muted);
cursor: pointer;
transition: all 0.2s;
font-family: ‘DM Sans’, sans-serif;
}

.add-btn:hover {
border-color: var(–accent);
color: var(–accent);
background: rgba(201,81,58,0.04);
}

.add-btn .plus { font-size: 20px; font-weight: 300; }

/* TASK CARD */
.task-card {
background: var(–card);
border: 1.5px solid var(–border);
border-radius: var(–radius);
margin-bottom: 10px;
transition: all 0.2s;
overflow: hidden;
}

.task-card.highlighted {
border-color: var(–pink-border);
background: var(–pink-highlight);
}

.task-card.flagged {
border-left: 4px solid #f0a500;
}

.task-card.highlighted.flagged {
border-left: 4px solid #f0a500;
border-color: var(–pink-border);
border-left-color: #f0a500;
background: var(–pink-highlight);
}

.task-main {
padding: 14px 16px;
display: flex;
align-items: flex-start;
gap: 12px;
}

/* CHECKBOX */
.checkbox-wrap { padding-top: 2px; flex-shrink: 0; }

.checkbox {
width: 22px;
height: 22px;
border: 2px solid var(–border);
border-radius: 6px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
flex-shrink: 0;
}

.checkbox:hover { border-color: var(–accent); }
.checkbox.checked { background: var(–text); border-color: var(–text); }
.checkbox.checked::after { content: ‘✓’; color: white; font-size: 13px; font-weight: 600; }

/* TASK BODY */
.task-body { flex: 1; min-width: 0; }

.task-name {
font-size: 15px;
font-weight: 500;
line-height: 1.3;
word-break: break-word;
}

.task-name.done {
text-decoration: line-through;
color: var(–muted);
}

.task-desc {
font-size: 13px;
color: var(–muted);
margin-top: 3px;
line-height: 1.4;
}

.task-meta {
display: flex;
flex-wrap: wrap;
gap: 6px;
margin-top: 6px;
align-items: center;
}

.meta-chip {
font-size: 11px;
padding: 2px 8px;
border-radius: 20px;
font-weight: 500;
}

.chip-created { background: #f0ede8; color: var(–muted); }
.chip-due { background: #fff0e8; color: #c96030; }
.chip-due.overdue { background: #ffe8e8; color: #c93030; }
.chip-completed { background: #e8f4e8; color: #2a7a2a; }

/* TASK ACTIONS */
.task-actions {
display: flex;
flex-direction: column;
gap: 4px;
flex-shrink: 0;
}

.action-btn {
width: 28px;
height: 28px;
border: none;
background: transparent;
cursor: pointer;
border-radius: 6px;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
transition: background 0.15s;
color: var(–muted);
}

.action-btn:hover { background: var(–border); }
.action-btn.active { color: var(–text); }
.action-btn.pink-active { color: #e0407a; }
.action-btn.flag-active { color: #f0a500; }

/* SUBTASKS */
.subtasks { padding: 0 16px 14px 50px; }

.subtask-item {
display: flex;
align-items: center;
gap: 8px;
padding: 5px 0;
border-top: 1px solid var(–border);
}

.subtask-checkbox {
width: 16px;
height: 16px;
border: 2px solid var(–border);
border-radius: 4px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: all 0.2s;
}

.subtask-checkbox.checked { background: var(–muted); border-color: var(–muted); }
.subtask-checkbox.checked::after { content: ‘✓’; color: white; font-size: 9px; font-weight: 700; }

.subtask-name {
font-size: 13px;
color: var(–text);
flex: 1;
}

.subtask-name.done { text-decoration: line-through; color: var(–muted); }

.subtask-del {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 14px;
padding: 2px 4px;
border-radius: 4px;
}

.subtask-del:hover { background: var(–border); }

.add-subtask-row {
display: flex;
gap: 6px;
padding-top: 6px;
border-top: 1px solid var(–border);
}

.subtask-input {
flex: 1;
border: 1px solid var(–border);
border-radius: 8px;
padding: 6px 10px;
font-size: 13px;
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
outline: none;
}

.subtask-input:focus { border-color: var(–text); }

.subtask-add-btn {
background: var(–text);
color: white;
border: none;
border-radius: 8px;
padding: 6px 12px;
font-size: 12px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
}

/* COMPLETED SECTION */
.completed-group { margin-bottom: 20px; }

.date-divider {
font-size: 11px;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 8px;
padding-left: 4px;
}

/* MODAL */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.5);
z-index: 200;
display: flex;
align-items: flex-end;
justify-content: center;
backdrop-filter: blur(4px);
}

.modal {
background: var(–card);
border-radius: 20px 20px 0 0;
padding: 24px 20px 40px;
width: 100%;
max-width: 680px;
animation: slideUp 0.25s ease-out;
}

@keyframes slideUp {
from { transform: translateY(100%); }
to { transform: translateY(0); }
}

.modal-title {
font-family: ‘DM Serif Display’, serif;
font-size: 22px;
margin-bottom: 20px;
}

.form-group { margin-bottom: 16px; }

.form-label {
display: block;
font-size: 12px;
font-weight: 600;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 6px;
}

.form-input, .form-textarea {
width: 100%;
border: 1.5px solid var(–border);
border-radius: 10px;
padding: 11px 14px;
font-size: 15px;
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
outline: none;
transition: border-color 0.2s;
}

.form-input:focus, .form-textarea:focus { border-color: var(–text); }
.form-textarea { resize: vertical; min-height: 80px; }

.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

.color-row {
display: flex;
align-items: center;
gap: 10px;
flex-wrap: wrap;
}

.color-chip {
width: 32px;
height: 32px;
border-radius: 50%;
cursor: pointer;
border: 3px solid transparent;
transition: border-color 0.15s, transform 0.15s;
}

.color-chip:hover { transform: scale(1.1); }
.color-chip.selected { border-color: var(–text); }

.modal-footer {
display: flex;
gap: 10px;
margin-top: 20px;
}

.btn-cancel {
flex: 1;
padding: 13px;
border: 1.5px solid var(–border);
border-radius: 10px;
background: transparent;
font-size: 15px;
font-weight: 500;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
color: var(–muted);
}

.btn-save {
flex: 2;
padding: 13px;
border: none;
border-radius: 10px;
background: var(–text);
color: white;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: opacity 0.2s;
}

.btn-save:hover { opacity: 0.85; }

/* EMPTY STATE */
.empty {
text-align: center;
padding: 40px 20px;
color: var(–muted);
}

.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-text { font-size: 15px; }

/* TOGGLE expand */
.expand-btn {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 16px;
padding: 2px 4px;
border-radius: 4px;
transition: transform 0.2s;
}

.expand-btn.open { transform: rotate(180deg); }

/* Stats bar */
.stats-bar {
display: flex;
gap: 12px;
margin-bottom: 4px;
}

.stat {
font-size: 12px;
color: var(–muted);
}

.stat strong {
color: var(–text);
font-weight: 600;
}

/* Color highlight options */
.highlight-option {
display: flex;
align-items: center;
gap: 8px;
font-size: 13px;
color: var(–muted);
margin-top: 8px;
}

.toggle-switch {
position: relative;
width: 40px;
height: 22px;
flex-shrink: 0;
}

.toggle-switch input { opacity: 0; width: 0; height: 0; }

.toggle-track {
position: absolute;
inset: 0;
background: var(–border);
border-radius: 22px;
cursor: pointer;
transition: background 0.2s;
}

.toggle-track::after {
content: ‘’;
position: absolute;
width: 16px;
height: 16px;
background: white;
border-radius: 50%;
top: 3px;
left: 3px;
transition: transform 0.2s;
box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

input:checked + .toggle-track { background: #e0407a; }
input:checked + .toggle-track::after { transform: translateX(18px); }

@media (max-width: 400px) {
.form-row { flex-direction: column; }
.task-actions { flex-direction: row; flex-wrap: wrap; }
}
</style>

</head>

<script>
// ─── HIGHLIGHT COLORS ───────────────────────────────────────────────
const COLORS = {
  pink:   { bg: '#ffe0ec', border: '#f4a0c0' },
  yellow: { bg: '#fef9c3', border: '#f0d060' },
  blue:   { bg: '#dbeafe', border: '#93c5fd' },
  green:  { bg: '#dcfce7', border: '#86efac' },
  purple: { bg: '#ede9fe', border: '#c4b5fd' },
  '':     { bg: '', border: '' },
};

const FLAG_LABELS = {
  waiting:  '⏳ Waiting',
  review:   '👁 Review',
  question: '❓ Question',
  followup: '🔁 Follow-up',
};

// ─── STATE ──────────────────────────────────────────────────────────
let activeTab = 'work';
let tasks = load('tf_tasks') || [];
let editingId = null;
let selectedColor = '';

function load(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function save() { localStorage.setItem('tf_tasks', JSON.stringify(tasks)); }

// ─── INIT ────────────────────────────────────────────────────────────
document.getElementById('todayBadge').textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
render();

// ─── TAB SWITCH ──────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'work') || (i === 1 && tab === 'personal'));
  });
  render();
}

// ─── MODAL ───────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  selectedColor = '';
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('taskNameInput').value = '';
  document.getElementById('taskDescInput').value = '';
  document.getElementById('taskDueInput').value = '';
  document.getElementById('taskFlagInput').value = '';

  if (id) {
    const t = tasks.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = 'Edit Task';
    document.getElementById('taskNameInput').value = t.name;
    document.getElementById('taskDescInput').value = t.desc || '';
    document.getElementById('taskDueInput').value = t.due || '';
    document.getElementById('taskFlagInput').value = t.flag || '';
    selectedColor = t.color || '';
    document.querySelectorAll('.color-chip').forEach(c => {
      if (c.dataset.color === selectedColor) c.classList.add('selected');
    });
  } else {
    document.getElementById('modalTitle').textContent = 'New Task';
  }

  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('taskNameInput').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectColor(el, color) {
  selectedColor = color;
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function saveTask() {
  const name = document.getElementById('taskNameInput').value.trim();
  if (!name) { document.getElementById('taskNameInput').style.borderColor = 'red'; return; }
  document.getElementById('taskNameInput').style.borderColor = '';

  const due = document.getElementById('taskDueInput').value;
  const desc = document.getElementById('taskDescInput').value.trim();
  const flag = document.getElementById('taskFlagInput').value;

  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    t.name = name; t.desc = desc; t.due = due; t.flag = flag; t.color = selectedColor;
  } else {
    tasks.push({
      id: Date.now().toString(),
      tab: activeTab,
      name, desc, due, flag,
      color: selectedColor,
      created: new Date().toISOString(),
      done: false,
      completedAt: null,
      subtasks: [],
      expanded: false,
    });
  }

  save();
  closeModal();
  render();
}

// ─── TASK ACTIONS ─────────────────────────────────────────────────────
function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  t.done = !t.done;
  t.completedAt = t.done ? new Date().toISOString() : null;
  save(); render();
}

function toggleHighlight(id) {
  const t = tasks.find(x => x.id === id);
  t.color = t.color ? '' : 'pink';
  save(); render();
}

function toggleFlag(id) {
  const t = tasks.find(x => x.id === id);
  t.flagged = !t.flagged;
  save(); render();
}

function toggleExpand(id) {
  const t = tasks.find(x => x.id === id);
  t.expanded = !t.expanded;
  save(); render();
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(x => x.id !== id);
  save(); render();
}

function addSubtask(taskId) {
  const input = document.getElementById('sub-input-' + taskId);
  const name = input.value.trim();
  if (!name) return;
  const t = tasks.find(x => x.id === taskId);
  t.subtasks.push({ id: Date.now().toString(), name, done: false });
  save(); render();
}

function toggleSubtask(taskId, subId) {
  const t = tasks.find(x => x.id === taskId);
  const s = t.subtasks.find(x => x.id === subId);
  s.done = !s.done;
  save(); render();
}

function deleteSubtask(taskId, subId) {
  const t = tasks.find(x => x.id === taskId);
  t.subtasks = t.subtasks.filter(x => x.id !== subId);
  save(); render();
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' +
    d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function groupByDate(arr) {
  const map = {};
  arr.forEach(t => {
    const key = new Date(t.completedAt).toDateString();
    if (!map[key]) map[key] = [];
    map[key].push(t);
  });
  return map;
}

function isOverdue(due) {
  if (!due) return false;
  return new Date(due + 'T23:59:59') < new Date();
}

// ─── RENDER TASK CARD ─────────────────────────────────────────────────
function renderCard(t) {
  const col = COLORS[t.color] || COLORS[''];
  const styleStr = col.bg ? `style="background:${col.bg};border-color:${col.border};"` : '';
  const flaggedBorder = t.flagged ? 'border-left:4px solid #f0a500;' : '';
  const combinedStyle = col.bg
    ? `style="background:${col.bg};border-color:${col.border};${flaggedBorder}"`
    : (t.flagged ? `style="${flaggedBorder}"` : '');

  const created = fmtDate(t.created);
  const dueChip = t.due
    ? `<span class="meta-chip chip-due${isOverdue(t.due) && !t.done ? ' overdue' : ''}">${isOverdue(t.due) && !t.done ? '⚠ ' : ''}Due ${fmtDate(t.due + 'T12:00:00')}</span>`
    : '';
  const flagChip = t.flag ? `<span class="meta-chip chip-created">${FLAG_LABELS[t.flag] || t.flag}</span>` : '';
  const completedChip = t.done && t.completedAt
    ? `<span class="meta-chip chip-completed">✓ ${fmtDateTime(t.completedAt)}</span>` : '';

  const subtaskCount = t.subtasks?.length || 0;
  const subDone = t.subtasks?.filter(s => s.done).length || 0;
  const subtaskChip = subtaskCount > 0
    ? `<span class="meta-chip chip-created">📋 ${subDone}/${subtaskCount} subtasks</span>` : '';

  const subtasksHtml = (t.expanded && subtaskCount >= 0) ? `
    <div class="subtasks">
      ${(t.subtasks || []).map(s => `
        <div class="subtask-item">
          <div class="subtask-checkbox ${s.done ? 'checked' : ''}" onclick="toggleSubtask('${t.id}','${s.id}')"></div>
          <span class="subtask-name ${s.done ? 'done' : ''}">${esc(s.name)}</span>
          <button class="subtask-del" onclick="deleteSubtask('${t.id}','${s.id}')">✕</button>
        </div>
      `).join('')}
      <div class="add-subtask-row">
        <input class="subtask-input" id="sub-input-${t.id}" placeholder="Add subtask..." onkeydown="if(event.key==='Enter')addSubtask('${t.id}')" />
        <button class="subtask-add-btn" onclick="addSubtask('${t.id}')">Add</button>
      </div>
    </div>
  ` : '';

  const highlightActive = t.color && t.color !== '' ? 'pink-active' : '';

  return `
    <div class="task-card" ${combinedStyle}>
      <div class="task-main">
        <div class="checkbox-wrap">
          <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleDone('${t.id}')"></div>
        </div>
        <div class="task-body">
          <div class="task-name ${t.done ? 'done' : ''}">${esc(t.name)}</div>
          ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
          <div class="task-meta">
            <span class="meta-chip chip-created">Added ${created}</span>
            ${dueChip}${flagChip}${subtaskChip}${completedChip}
          </div>
        </div>
        <div class="task-actions">
          <button class="action-btn ${highlightActive}" onclick="toggleHighlight('${t.id}')" title="Highlight (Urgent)">🌸</button>
          <button class="action-btn ${t.flagged ? 'flag-active' : ''}" onclick="toggleFlag('${t.id}')" title="Flag">🚩</button>
          <button class="expand-btn ${t.expanded ? 'open' : ''}" onclick="toggleExpand('${t.id}')" title="Subtasks">▾</button>
          <button class="action-btn" onclick="openModal('${t.id}')" title="Edit">✏️</button>
          <button class="action-btn" onclick="deleteTask('${t.id}')" title="Delete">🗑</button>
        </div>
      </div>
      ${subtasksHtml}
    </div>
  `;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── RENDER ───────────────────────────────────────────────────────────
function render() {
  const tabTasks = tasks.filter(t => t.tab === activeTab);
  const open = tabTasks.filter(t => !t.done);
  const done = tabTasks.filter(t => t.done);

  // Sort open: urgent (colored) first, then by due date
  open.sort((a, b) => {
    const aU = a.color ? 0 : 1;
    const bU = b.color ? 0 : 1;
    if (aU !== bU) return aU - bU;
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return new Date(b.created) - new Date(a.created);
  });

  // Sort done: most recent first
  done.sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));

  // Render open
  const taskListEl = document.getElementById('taskList');
  taskListEl.innerHTML = open.length
    ? open.map(renderCard).join('')
    : '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">No open tasks — you\'re all caught up!</div></div>';

  // Render completed grouped by date
  const completedEl = document.getElementById('completedList');
  if (!done.length) {
    completedEl.innerHTML = '<div class="empty" style="padding:20px"><div class="empty-text">No completed tasks yet</div></div>';
  } else {
    const groups = groupByDate(done);
    completedEl.innerHTML = Object.keys(groups).map(dateKey => `
      <div class="completed-group">
        <div class="date-divider">${formatGroupDate(dateKey)}</div>
        ${groups[dateKey].map(renderCard).join('')}
      </div>
    `).join('');
  }

  // Stats
  document.getElementById('openCount').textContent = open.length;
  document.getElementById('doneCount').textContent = done.length;
  document.getElementById('urgentCount').textContent = open.filter(t => t.color).length;
}

function formatGroupDate(dateKey) {
  const d = new Date(dateKey);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Completed Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Completed Yesterday';
  return 'Completed ' + d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
</script>
